loop:
  title: "P-R-R-V Loop"
  description: "Plan tasks and tool use, retrieve candidates, rerank with grounded reasoning, then verify with calibrated evidence."
  steps:
    - name: "Plan"
      key: "P"
      detail: "Agentic Planning & Routing across generative multimodal models"
    - name: "Retrieve"
      key: "R"
      detail: "Multimodal Retrieval and Reranking across structured and unstructured knowledge sources"
    - name: "Reason"
      key: "R"
      detail: "Grounded multimodal reasoning using tool-use, augemented generations, generative editing, and temporal video orchestration"
    - name: "Verify"
      key: "V"
      detail: "Calibrated verification via citation provenance, metric design, and rigorous benchmark curation"
